<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뽀모도로 & 스톱워치</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .hidden-view { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-xl overflow-hidden p-6">
        
        <!-- Header & Tabs -->
        <div class="flex space-x-4 mb-8">
            <button onclick="switchTab('pomodoro')" id="btn-pomodoro" class="tab-active py-2 font-semibold flex-1">뽀모도로</button>
            <button onclick="switchTab('stopwatch')" id="btn-stopwatch" class="py-2 font-semibold flex-1 text-slate-400">스톱워치</button>
        </div>

        <!-- Pomodoro View -->
        <div id="view-pomodoro" class="space-y-6">
            <div class="text-center">
                <h2 id="pomodoro-status" class="text-sm font-bold text-slate-500 uppercase tracking-widest">집중 시간</h2>
                <div id="pomodoro-display" class="text-7xl font-mono font-bold text-slate-800 my-4">25:00</div>
                <div class="flex justify-center space-x-2">
                    <button onclick="togglePomodoro()" id="btn-pomodoro-start" class="bg-blue-500 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-600">시작</button>
                    <button onclick="resetPomodoro()" class="bg-slate-200 text-slate-700 px-6 py-3 rounded-full font-bold hover:bg-slate-300">재설정</button>
                </div>
            </div>

            <!-- Checklist -->
            <div class="border-t pt-4">
                <div class="flex mb-2">
                    <input type="text" id="task-input" placeholder="집중할 일 추가..." class="flex-1 border rounded-l-lg p-2 outline-none">
                    <button onclick="addTask()" class="bg-slate-800 text-white px-4 rounded-r-lg">추가</button>
                </div>
                <ul id="task-list" class="space-y-2"></ul>
            </div>
        </div>

        <div id="view-stopwatch" class="hidden-view space-y-6">
            <div class="text-center">
                <div id="stopwatch-display" class="text-7xl font-mono font-bold text-slate-800 my-8">00:00:00</div>
                <div class="flex justify-center space-x-2">
                    <button onclick="toggleStopwatch()" id="btn-stopwatch-start" class="bg-emerald-500 text-white px-8 py-3 rounded-full font-bold hover:bg-emerald-600">시작</button>
                    <button onclick="resetStopwatch()" class="bg-slate-200 text-slate-700 px-6 py-3 rounded-full font-bold hover:bg-slate-300">초기화</button>
                </div>
            </div>
            <div id="laps" class="h-40 overflow-y-auto border-t pt-4 text-sm text-slate-600"></div>
        </div>
    </div>

    <script>
        let pomodoroTime = 25 * 60;
        let isPomodoroRunning = false;
        let isBreak = false;
        let pomodoroInterval;

        let stopwatchTime = 0;
        let isStopwatchRunning = false;
        let stopwatchInterval;

        // Sound generator
        function playBeep() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            gain.gain.setValueAtTime(0.2, ctx.currentTime);
            osc.start();
            osc.stop(ctx.currentTime + 0.5);
        }

        function switchTab(tab) {
            if(tab === 'pomodoro') {
                document.getElementById('view-pomodoro').classList.remove('hidden-view');
                document.getElementById('view-stopwatch').classList.add('hidden-view');
                document.getElementById('btn-pomodoro').className = 'tab-active py-2 font-semibold flex-1';
                document.getElementById('btn-stopwatch').className = 'py-2 font-semibold flex-1 text-slate-400';
            } else {
                document.getElementById('view-pomodoro').classList.add('hidden-view');
                document.getElementById('view-stopwatch').classList.remove('hidden-view');
                document.getElementById('btn-pomodoro').className = 'py-2 font-semibold flex-1 text-slate-400';
                document.getElementById('btn-stopwatch').className = 'tab-active py-2 font-semibold flex-1';
            }
        }

        function togglePomodoro() {
            if (isPomodoroRunning) {
                clearInterval(pomodoroInterval);
                document.getElementById('btn-pomodoro-start').innerText = '시작';
            } else {
                document.getElementById('btn-pomodoro-start').innerText = '일시정지';
                pomodoroInterval = setInterval(() => {
                    pomodoroTime--;
                    updateDisplay('pomodoro', pomodoroTime);
                    if (pomodoroTime <= 0) {
                        clearInterval(pomodoroInterval);
                        playBeep();
                        isBreak = !isBreak;
                        pomodoroTime = isBreak ? 5 * 60 : 25 * 60;
                        document.getElementById('pomodoro-status').innerText = isBreak ? '휴식 시간' : '집중 시간';
                        togglePomodoro(); 
                    }
                }, 1000);
            }
            isPomodoroRunning = !isPomodoroRunning;
        }

        function resetPomodoro() {
            clearInterval(pomodoroInterval);
            isPomodoroRunning = false;
            pomodoroTime = 25 * 60;
            isBreak = false;
            document.getElementById('pomodoro-status').innerText = '집중 시간';
            document.getElementById('btn-pomodoro-start').innerText = '시작';
            updateDisplay('pomodoro', pomodoroTime);
        }

        function toggleStopwatch() {
            if (isStopwatchRunning) {
                clearInterval(stopwatchInterval);
                document.getElementById('btn-stopwatch-start').innerText = '시작';
            } else {
                document.getElementById('btn-stopwatch-start').innerText = '중지';
                stopwatchInterval = setInterval(() => {
                    stopwatchTime++;
                    updateDisplay('stopwatch', stopwatchTime);
                }, 1000);
            }
            isStopwatchRunning = !isStopwatchRunning;
        }

        function resetStopwatch() {
            clearInterval(stopwatchInterval);
            isStopwatchRunning = false;
            stopwatchTime = 0;
            document.getElementById('btn-stopwatch-start').innerText = '시작';
            document.getElementById('laps').innerHTML = '';
            updateDisplay('stopwatch', stopwatchTime);
        }

        function updateDisplay(type, time) {
            if (type === 'pomodoro') {
                const min = Math.floor(time / 60);
                const sec = time % 60;
                document.getElementById('pomodoro-display').innerText = 
                    `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
            } else {
                const hrs = Math.floor(time / 3600);
                const min = Math.floor((time % 3600) / 60);
                const sec = time % 60;
                document.getElementById('stopwatch-display').innerText = 
                    `${String(hrs).padStart(2, '0')}:${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
            }
        }

        function addTask() {
            const input = document.getElementById('task-input');
            if (!input.value) return;
            const li = document.createElement('li');
            li.className = "flex items-center space-x-2 bg-slate-100 p-2 rounded";
            li.innerHTML = `<input type="checkbox" class="w-4 h-4"> <span>${input.value}</span>`;
            document.getElementById('task-list').appendChild(li);
            input.value = '';
        }
    </script>
</body>
</html>
